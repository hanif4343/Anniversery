name: love_journey
description: "Hanif & Santona - Anniversary Interactive Love Story App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Local storage (metadata: titles, dates, descriptions, file paths, settings)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # Media
  image_picker: ^1.0.7
  video_player: ^2.8.2
  audioplayers: ^5.2.1
  record: ^5.0.4      # voice recording
  permission_handler: ^11.2.0
  file_picker: ^8.0.0+1  # for picking mp3/music files

  # State management (simple, beginner-friendly)
  provider: ^6.1.1

  # Nice-to-have UI helpers
  google_fonts: ^6.1.0
  lottie: ^3.1.0        # for lightweight JSON animations (hearts, sparkles etc.)
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/music/
    - assets/animations/
    - assets/backgrounds/

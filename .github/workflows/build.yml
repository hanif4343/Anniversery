name: Build APK

# Runs automatically every time you push code to the main branch.
# Also lets you trigger it manually from the Actions tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # No fixed version pinned - always uses the latest stable Flutter,
          # so the android/ folder it generates below is always compatible
          # with the Gradle/Java setup on this machine.

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate Android platform folder (avoids Gradle version mismatches)
        run: |
          rm -rf android
          flutter create --platforms=android --project-name love_journey .

      - name: Add required permissions to AndroidManifest.xml
        run: |
          python3 - <<'PYEOF'
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path, "r") as f:
              content = f.read()

          permissions = (
              '    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n'
              '    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n'
              '    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n'
              '    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />\n'
              '    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n'
          )

          marker = "<application"
          idx = content.find(marker)
          if idx != -1 and "RECORD_AUDIO" not in content:
              content = content[:idx] + permissions + content[idx:]
              with open(path, "w") as f:
                  f.write(content)
              print("Permissions added.")
          else:
              print("Permissions already present or marker not found, skipping.")
          PYEOF

      - name: Set app display name
        run: |
          sed -i 's/android:label="love_journey"/android:label="Love Journey"/' android/app/src/main/AndroidManifest.xml

      - name: Generate Hive adapters
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: love-journey-apk
          path: build/app/outputs/flutter-apk/app-release.apk
